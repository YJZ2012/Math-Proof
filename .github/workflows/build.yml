name: Build and Deploy Markdown

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install markdown
        run: pip install markdown

      - name: Convert all md to html
        run: |
          for file in *.md; do
            if [ "$file" != "README.md" ]; then
              base=$(basename "$file" .md)
              python -c "
import markdown
import sys
with open('$file', 'r', encoding='utf-8') as f:
    content = f.read()
html = markdown.markdown(content, extensions=['fenced_code', 'tables', 'md_in_html'])
with open('$base.html', 'w', encoding='utf-8') as f:
    f.write(f'''<!DOCTYPE html>
<html>
<head>
    <meta charset=\"utf-8\">
    <title>$base</title>
    <style>
        body {{ max-width: 900px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; line-height: 1.6; }}
        pre {{ background: #f4f4f4; padding: 10px; overflow-x: auto; }}
        code {{ background: #f4f4f4; padding: 2px 4px; }}
        .MathJax {{ font-size: 1.1em; }}
    </style>
    <script src=\"https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js\"></script>
</head>
<body>
{html}
</body>
</html>''')
''
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
